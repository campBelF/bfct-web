// Determine the exact date of the Friday of the specified weekend based on user selected year.
function determineWeekendDate(aYear)
{
   //weekend will be based on where 14th falls every year
   var oCurrentYearTripStartDate = new Date("02/14/" + aYear)
   var iDayNumber = oCurrentYearTripStartDate.getDay()
   if (iDayNumber == 5) //friday
   {
     oCurrentYearTripStartDate.setDate(oCurrentYearTripStartDate.getDate() - (iDayNumber + 2));  //subtract 7 days to get the desired Friday
   }
   else if (iDayNumber == 6) //saturday 
   {
     oCurrentYearTripStartDate.setDate(oCurrentYearTripStartDate.getDate() - (iDayNumber + 2));  //subtract 8 days to get desired Friday   
   }
   else if (iDayNumber == 0) //sunday 
   {
     oCurrentYearTripStartDate.setDate(oCurrentYearTripStartDate.getDate() - 9);  //subtract 9 days to get the desired Friday   
   }   
   else //any other day
   {
     oCurrentYearTripStartDate.setDate(oCurrentYearTripStartDate.getDate() - (iDayNumber + 2));  //subtract iDayNumber plus 2 days to get prev desired Friday      
   }
   //alert (oCurrentYearTripStartDate)
   //alert (oCurrentYearTripStartDate.getUTCFullYear());
   //alert (oCurrentYearTripStartDate.getMonth());
   //alert (oCurrentYearTripStartDate.getDate());      
   //timerEnd is value used for digital countdown clock
   timerEnd = new Date(Date.UTC(oCurrentYearTripStartDate.getUTCFullYear(), oCurrentYearTripStartDate.getMonth(), oCurrentYearTripStartDate.getDate(), 0, 0, 0));
   //alert (timerEnd);
   mTheDesiredDate = oCurrentYearTripStartDate  //Set var to be used in other functions
   // Call remaining functions to calculate date data
   calcDaysRemaining();
   calcLongDate();
   calcDateDiff();
}


// Determine if the start of the current year's trip has taken place already.
function currentYearWeekendHasPassed()
{
   //weekend will be based on where 14th falls every year
   var oCurrentYearTripStartDate = new Date();
   var oTodaysDate = new Date();
   var oCalculatedStartDate = new Date("02/14/" + oTodaysDate.getFullYear())
   var iDayNumber = oCalculatedStartDate.getDay()
   if (iDayNumber == 5) //friday
   {
     oCalculatedStartDate.setDate(oCalculatedStartDate.getDate() - (iDayNumber + 2));  //subtract 7 days to get the desired Friday
   }
   else if (iDayNumber == 6) //saturday 
   {
     oCalculatedStartDate.setDate(oCalculatedStartDate.getDate() - (iDayNumber + 2));  //subtract 8 days to get desired Friday   
   }
   else if (iDayNumber == 0) //sunday 
   {
     oCalculatedStartDate.setDate(oCalculatedStartDate.getDate() - 9);  //subtract 9 days to get the desired Friday   
   }   
   else //any other day
   {
     oCalculatedStartDate.setDate(oCalculatedStartDate.getDate() - (iDayNumber + 2));  //subtract iDayNumber plus 2 days to get prev desired Friday      
   }
   //alert (oCalculatedStartDate)
   oCurrentYearTripStartDate = oCalculatedStartDate 

   //determine difference in two dates (start of the current year's date and today's date)
   var iDaysElapsed = daysElapsed(oCurrentYearTripStartDate, oTodaysDate);
   //alert ("dayselaps " + iDaysElapsed);
   
   //has the trip taken place for this year or not
   if (iDaysElapsed > 0) //still hasnt happened for this year yet
   {	
     return false;  
   }
   else
   {
     return true;  
   }
}


function calcDateDiff() 
{
	var oCurrentDateTime = new Date();
	var oDesiredDate = mTheDesiredDate;
	iDays = (oDesiredDate - oCurrentDateTime) / 1000 / 60 / 60 / 24;
	iDaysRound = Math.floor(iDays);
	iHours = (oDesiredDate - oCurrentDateTime) / 1000 / 60 / 60 - (24 * iDaysRound);
	iHoursRound = Math.floor(iHours);
	iMinutes = (oDesiredDate - oCurrentDateTime) / 1000 /60 - (24 * 60 * iDaysRound) - (60 * iHoursRound);
	iMinutesRound = Math.floor(iMinutes);
	iSeconds = (oDesiredDate - oCurrentDateTime) / 1000 - (24 * 60 * 60 * iDaysRound) - (60 * 60 * iHoursRound) - (60 * iMinutesRound);
	iSecondsRound = Math.round(iSeconds);

	if (mUserSelectedNewYear == false)  //dont allow display of data while generateRandomNums is executing (user clicked new year).
	{
		singOrPlurSecs.innerHTML = (iSecondsRound == 1) ? "Second" : "Seconds";
		singOrPlurMins.innerHTML = (iMinutesRound == 1) ? "Minute" : "Minutes";
		singOrPlurHours.innerHTML = (iHoursRound == 1) ? "Hour" : "Hours";
		singOrPlurDays.innerHTML  = (iDaysRound == 1)  ? "Day" : "Days";
	
	   //preciseYears.innerHTML=diffYear;
	   //preciseMonths.innerHTML=diffMonth;
	    preciseDays.innerHTML=iDaysRound;
	    preciseHours.innerHTML=iHoursRound;
	    preciseMinutes.innerHTML=iMinutesRound;
	    preciseSeconds.innerHTML=iSecondsRound;   
		
		oNewTime = window.setTimeout("calcDateDiff();", 1000);
	}
}


function calcDaysRemaining()
{
  var oCurrentDate = new Date();
  var oDesiredWeekendDate = mTheDesiredDate;
  var iDateDifference = oDesiredWeekendDate.getTime() - oCurrentDate.getTime();
  var iNumOfDaysRemaining = Math.floor(iDateDifference / (1000 * 60 * 60 * 24));
  //if (iNumOfDaysRemaining > 0)
  {
  	mNumOfDaysRemaining = iNumOfDaysRemaining + " days";
  	if (iNumOfDaysRemaining == 1)
  	{
  		mNumOfDaysRemaining = iNumOfDaysRemaining + " day";
  	}
  }
}

function calcLongDate()
{
  var oCurrentDate = new Date();
  var oDesiredWeekendDate = mTheDesiredDate;
  //if (oDesiredWeekendDate > oCurrentDate)
  {
    mLongDate = "Friday, February " + oDesiredWeekendDate.getDate() + ", " + oDesiredWeekendDate.getFullYear();
  }
}


// Flash message in Status Bar of browser
var control = 1;
function flashStatusText()
{
  if (control == 1)

      control=0;
    }  
  else

}

function daysElapsed(aDate1,aDate2) 
{
    var difference =
        Date.UTC(y2k(aDate1.getYear()),aDate1.getMonth(),aDate1.getDate(),0,0,0)
      - Date.UTC(y2k(aDate2.getYear()),aDate2.getMonth(),aDate2.getDate(),0,0,0);
    return difference/1000/60/60/24;
}

function y2k(aYear) 
{ 
  return (aYear < 1000) ? aYear + 1900 : aYear; 
}


var mCounter = 25;
function generateRandomNums()

		mCounter = 25;

		displayMessageText(mSelectedYear);
	}
}

<script>
function startTimer2()
{
  var DSTAdjust = 0;
  oneMinute = 1000 * 60;
  var oneDay = oneMinute * 60 * 24;
  var expired = 0;
  time = new Date();
  if (time.getTime() > timerEnd.getTime())
  {
  	//alert(time);
  	//alert(timerEnd);  	
    expired = 1;
  }
  else
  {
    //DSTAdjust = (timerEnd.getTimezoneOffset( ) - time.getTimezoneOffset( )) * oneMinute;
    //var diff = Math.abs(timerEnd.getTime( ) - time.getTime( )) - DSTAdjust;
    //FDC mod for this timezone
    DSTAdjust = timerEnd.getTimezoneOffset( ) * oneMinute;
	var diff = Math.abs(timerEnd.getTime( ) - time.getTime( )) + DSTAdjust;
    
    var days = Math.floor(diff/oneDay);
    var hours = Math.floor(diff/(60*oneMinute)) % 24;
    var minutes = Math.floor(diff/oneMinute) % 60;
    var seconds = Math.floor(diff/1000) % 60;
    var mseconds = diff % 1000;
  }
  if (expired)
  {
    document.getElementById('timer').innerHTML = "<tr><td>EXPIRED</td></tr>";
  }
  else
  {
    document.getElementById('days2').innerHTML = Math.floor(days/100);
    document.getElementById('days1').innerHTML = Math.floor((days%100)/10);
    document.getElementById('days0').innerHTML = days % 10;

    document.getElementById('hours1').innerHTML = Math.floor(hours/10);
    document.getElementById('hours0').innerHTML = hours % 10;

    document.getElementById('mins1').innerHTML = Math.floor(minutes/10);
    document.getElementById('mins0').innerHTML = minutes % 10;

    document.getElementById('secs1').innerHTML = Math.floor(seconds/10);
    document.getElementById('secs0').innerHTML = seconds % 10;

    document.getElementById('msecs2').innerHTML = Math.floor(mseconds/100);
    document.getElementById('msecs1').innerHTML = Math.floor((mseconds%100)/10);
    document.getElementById('msecs0').innerHTML = mseconds % 10;
    toCountdown = setTimeout('startTimer2()', 100);
  }
}
